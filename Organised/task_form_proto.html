
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-size: 14px; }
.layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 420px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.form-panel { padding: 1.25rem; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; gap: 1rem; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: var(--color-text-secondary); }
.field input, .field select { width: 100%; }
.freq-row { display: flex; align-items: center; gap: 8px; }
.freq-row input { width: 70px; }
.freq-row span { font-size: 13px; color: var(--color-text-secondary); }
.add-btn { margin-top: auto; width: 100%; padding: 9px; background: #22d3ee; border: none; border-radius: var(--border-radius-md); color: #083344; font-size: 13px; font-weight: 500; cursor: pointer; }
.add-btn:hover { background: #06b6d4; }
.list-panel { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.list-header { display: flex; justify-content: space-between; align-items: center; }
.list-header span { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.capacity-block { display: flex; align-items: center; gap: 10px; }
.capacity-block span { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
.capacity-num { font-size: 12px; color: var(--color-text-tertiary); }
.gauge-track { width: 100px; height: 4px; background: var(--color-border-tertiary); border-radius: 99px; overflow: hidden; }
.gauge-fill { height: 100%; width: 43%; background: #22d3ee; border-radius: 99px; }
.tags-area { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 99px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); transition: opacity 0.15s; }
.tag:hover { border-color: var(--color-border-secondary); }
.tag .freq-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--color-text-secondary); display: none; }
.tag.show-freq .freq-dot { display: flex; }
.footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 0.75rem; border-top: 0.5px solid var(--color-border-tertiary); }
.footer-hint { font-size: 11px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 4px; }
.toggle-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); }
.toggle { width: 32px; height: 18px; background: var(--color-border-secondary); border-radius: 99px; position: relative; cursor: pointer; transition: background 0.2s; }
.toggle.on { background: #22d3ee; }
.toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
.toggle.on::after { left: 16px; }
</style>

<div class="layout">
  <div class="form-panel">
    <div class="field">
      <label>Task</label>
      <input type="text" placeholder="e.g. Hoover">
    </div>
    <div class="field">
      <label>Category</label>
      <select>
        <option>Pick one</option>
        <option>Cleaning</option>
        <option>Admin</option>
        <option>Exercise</option>
      </select>
    </div>
    <div class="field">
      <label>Frequency</label>
      <div class="freq-row">
        <input type="number" min="1" max="31" placeholder="4">
        <span>x per month</span>
      </div>
    </div>
    <button class="add-btn">Add task</button>
  </div>

  <div class="list-panel">
    <div class="list-header">
      <span>Tasks</span>
      <div class="capacity-block">
        <span>Monthly capacity</span>
        <span class="capacity-num">12/28</span>
        <div class="gauge-track"><div class="gauge-fill"></div></div>
      </div>
    </div>

    <div class="tags-area" id="tags">
      <div class="tag show-freq">Hoover<span class="freq-dot">4</span></div>
      <div class="tag show-freq">Surfaces<span class="freq-dot">4</span></div>
      <div class="tag show-freq">Mirror & sinks<span class="freq-dot">2</span></div>
      <div class="tag show-freq">Toilet<span class="freq-dot">4</span></div>
      <div class="tag show-freq">Bedding<span class="freq-dot">1</span></div>
      <div class="tag show-freq">Mopping<span class="freq-dot">2</span></div>
      <div class="tag show-freq">Laundry<span class="freq-dot">4</span></div>
      <div class="tag show-freq">Bin<span class="freq-dot">4</span></div>
      <div class="tag show-freq">Top cupboards<span class="freq-dot">1</span></div>
      <div class="tag show-freq">Glass dispensary<span class="freq-dot">2</span></div>
      <div class="tag show-freq">Shower<span class="freq-dot">2</span></div>
      <div class="tag show-freq">Windows<span class="freq-dot">1</span></div>
    </div>

    <div class="footer">
      <div class="footer-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Double-click to delete
      </div>
      <div class="toggle-row">
        Show frequencies
        <div class="toggle on" id="tog"></div>
      </div>
    </div>
  </div>
</div>

<script>
const tog = document.getElementById('tog');
const tags = document.querySelectorAll('.tag');
let on = true;
tog.addEventListener('click', () => {
  on = !on;
  tog.classList.toggle('on', on);
  tags.forEach(t => t.classList.toggle('show-freq', on));
});
tags.forEach(t => {
  t.addEventListener('dblclick', () => t.remove());
});
</script>
